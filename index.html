<html lang="en">
  <head>

    <meta name="author" content="Vintech Systems and Consulting" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph -->
    
    
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vintechsystems.store/" />
    <meta property="og:image" content="https://vintechsystems.store/vintech-logo.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    
    
    <meta name="twitter:image" content="https://vintechsystems.store/vintech-logo.png">

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Vintech Systems and Consulting",
      "alternateName": "Vintech Systems",
      "description": "Enterprise-grade web development, cybersecurity, IT support, and managed hosting solutions for growing businesses.",
      "url": "https://vintechsystems.store",
      "logo": "https://vintechsystems.store/vintech-logo.png",
      "image": "https://vintechsystems.store/vintech-logo.png",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Nairobi",
        "addressCountry": "KE"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "info@vintechsystems.store",
        "availableLanguage": ["English"]
      },
      "sameAs": [],
      "serviceType": ["Web Development", "Cybersecurity", "IT Support", "Technology Consulting", "Managed Hosting", "Domain Management"],
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": { "@type": "GeoCoordinates", "latitude": -1.2921, "longitude": 36.8219 },
        "geoRadius": "50000"
      },
      "priceRange": "$$",
      "knowsAbout": ["Web Development", "Cybersecurity", "Cloud Hosting", "IT Consulting", "Domain Management"]
    }
    </script>

    <!-- Structured Data: WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Vintech Systems and Consulting",
      "alternateName": "Vintech Systems",
      "url": "https://vintechsystems.store",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://vintechsystems.store/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <meta property="og:title" content="Vintech Systems and Consulting — Web Development, Cybersecurity &amp; IT Solutions">
  <meta name="twitter:title" content="Vintech Systems and Consulting — Web Development, Cybersecurity &amp; IT Solutions">
  <meta property="og:description" content="Vintech Systems and Consulting delivers enterprise-grade web development, cybersecurity, IT support, and managed hosting solutions for growing businesses worldwide.">
  <meta name="twitter:description" content="Vintech Systems and Consulting delivers enterprise-grade web development, cybersecurity, IT support, and managed hosting solutions for growing businesses worldwide.">
</head>
